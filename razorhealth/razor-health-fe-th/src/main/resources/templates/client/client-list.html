<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::section})}">

<section>
    <h2>Add New Client</h2>

    <form th:action="@{/clients}" method="post" th:object="${client}">
        <div>
            <label for="clientName">Client Name:</label>
            <input type="text" id="clientName" name="clientName" th:field="*{clientName}" required>
        </div>

        <div>
            <label for="clientAddress">Address:</label>
            <input type="text" id="clientAddress" name="clientAddress" th:field="*{clientAddress}" required>
        </div>

        <div>
            <label for="clientArea">Area:</label>
            <input type="text" id="clientArea" name="clientArea" th:field="*{clientArea}" required>
        </div>

        <div>
            <label for="clientImportance">Importance:</label>
            <select id="clientImportance" name="clientImportance" th:field="*{clientImportance}" required>
                <option value="">Select Importance</option>
                <option value="HIGH">High</option>
                <option value="MEDIUM">Medium</option>
                <option value="LOW">Low</option>
            </select>
        </div>

        <div>
            <label for="clientGender">Gender:</label>
            <select id="clientGender" name="clientGender" th:field="*{clientGender}" required>
                <option value="">Select Gender</option>
                <option value="MALE">Male</option>
                <option value="FEMALE">Female</option>
                <option value="OTHER">Other</option>
            </select>
        </div>

        <div>
            <label for="clientHasPet">Has Pet:</label>
            <input type="checkbox" id="clientHasPet" name="clientHasPet" th:field="*{clientHasPet}">
        </div>

        <button type="submit">Save Client</button>
    </form>

    <h2>Clients</h2>

    <table >
        <tr>
            <th>Name</th>
            <th>Importance</th>
            <th>Address</th>
        </tr>

        <tr th:each="c : ${clients}">
            <td th:text="${c.clientName}"></td>
            <td th:text="${c.clientImportance}"></td>
            <td th:text="${c.clientAddress}"></td>
        </tr>
    </table>

</section>

</html>
